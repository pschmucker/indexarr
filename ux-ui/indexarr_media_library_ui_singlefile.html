<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Indexarr</title>
  <style>
    :root {
      --color-primary: #1D9E75;
      --color-primary-soft: #E1F5EE;
      --color-primary-border: #5DCAA5;
      --color-primary-text: #085041;
      --color-primary-badge: #9FE1CB;

      --color-status-ok: #1D9E75;
      --color-status-warning: #EF9F27;
      --color-status-missing: #E24B4A;

      --color-badge-4k: #D9A63C;
      --color-badge-1080: #1D9E75;
      --color-badge-dv: #8457D8;
      --color-badge-hdr10: #3B82F6;

      --color-background-primary: #0F1115;
      --color-background-secondary: #171A1F;
      --color-background-tertiary: #1E232B;

      --color-text-primary: #F5F7FA;
      --color-text-secondary: #B0B7C3;
      --color-text-tertiary: #808998;

      --color-border-secondary: rgba(255,255,255,0.08);
      --color-border-tertiary: rgba(255,255,255,0.05);

      --border-radius-md: 12px;
      --border-radius-lg: 18px;

      --font-sans: Inter, ui-sans-serif, system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: var(--font-sans);
      background: var(--color-background-primary);
      color: var(--color-text-primary);
      overflow: hidden;
      font-weight: 400;
    }

    button,
    input {
      font-family: inherit;
    }

    .app {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 210px;
      border-right: 0.5px solid var(--color-border-secondary);
      background: var(--color-background-secondary);
      padding: 18px 0;
      display: flex;
      flex-direction: column;
    }

    .logo {
      padding: 0 20px 22px;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.03em;
    }

    .logo span {
      color: var(--color-primary);
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      cursor: pointer;
      border-left: 3px solid transparent;
      color: var(--color-text-secondary);
      transition: 0.15s ease;
    }

    .nav-item:hover {
      background: var(--color-background-tertiary);
      color: var(--color-text-primary);
    }

    .nav-item.active {
      border-left-color: var(--color-primary);
      background: var(--color-primary-soft);
      color: var(--color-primary-text);
    }

    .nav-badge {
      background: var(--color-primary-badge);
      color: #05392E;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      height: 72px;
      border-bottom: 0.5px solid var(--color-border-secondary);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 18px;
      background: var(--color-background-primary);
    }

    .search {
      position: relative;
      width: 480px;
      max-width: 100%;
    }

    .search input {
      width: 100%;
      background: var(--color-background-secondary);
      border: 0.5px solid var(--color-border-secondary);
      border-radius: 999px;
      height: 44px;
      padding: 0 52px 0 18px;
      color: var(--color-text-primary);
      outline: none;
      transition: 0.15s ease;
      font-size: 14px;
    }

    .search input:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(29,158,117,0.2);
    }

    .shortcut {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: var(--color-text-tertiary);
      border: 0.5px solid var(--color-border-secondary);
      border-radius: 8px;
      padding: 4px 8px;
    }

    .content {
      flex: 1;
      overflow: auto;
      padding: 24px 28px 40px;
    }

    .breadcrumb-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .back-btn {
      border: 0.5px solid var(--color-border-secondary);
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
      border-radius: var(--border-radius-md);
      height: 40px;
      padding: 0 16px;
      cursor: pointer;
    }

    .breadcrumb {
      color: var(--color-text-secondary);
      font-size: 14px;
    }

    .filters {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }

    .chips {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .chip {
      height: 38px;
      border-radius: 999px;
      border: 0.5px solid var(--color-border-secondary);
      background: var(--color-background-secondary);
      color: var(--color-text-secondary);
      padding: 0 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .chip.active {
      background: var(--color-primary-soft);
      border-color: var(--color-primary-border);
      color: var(--color-primary-text);
    }

    .chip-count {
      background: var(--color-primary-badge);
      color: #063C30;
      border-radius: 999px;
      padding: 1px 7px;
      font-size: 11px;
    }

    .view-toggle {
      display: flex;
      gap: 8px;
    }

    .toggle-btn {
      width: 40px;
      height: 40px;
      border-radius: var(--border-radius-md);
      border: 0.5px solid var(--color-border-secondary);
      background: var(--color-background-secondary);
      color: var(--color-text-secondary);
      cursor: pointer;
    }

    .toggle-btn.active {
      background: var(--color-primary-soft);
      color: var(--color-primary-text);
      border-color: var(--color-primary-border);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--color-background-secondary);
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-lg);
      padding: 18px;
    }

    .stat-label {
      color: var(--color-text-secondary);
      font-size: 13px;
      margin-bottom: 12px;
    }

    .stat-value {
      font-size: 30px;
      letter-spacing: -0.04em;
      font-weight: 500;
    }

    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
    }

    .media-card {
      border: 0.5px solid var(--color-border-secondary);
      background: var(--color-background-secondary);
      border-radius: var(--border-radius-lg);
      overflow: hidden;
      cursor: pointer;
    }

    .poster {
      aspect-ratio: 2/3;
      background: var(--color-background-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 54px;
      color: var(--color-text-tertiary);
      position: relative;
    }

    .card-body {
      padding: 14px;
    }

    .title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }

    .media-title {
      font-size: 15px;
      font-weight: 500;
    }

    .media-year {
      color: var(--color-text-tertiary);
      font-size: 13px;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .badge {
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 11px;
      color: white;
    }

    .badge-4k { background: var(--color-badge-4k); }
    .badge-1080 { background: var(--color-badge-1080); }
    .badge-dv { background: var(--color-badge-dv); }
    .badge-hdr10 { background: var(--color-badge-hdr10); }
    .badge-missing { background: var(--color-status-missing); }

    .status-bar {
      height: 4px;
      margin-top: 14px;
    }

    .status-ok { background: var(--color-status-ok); }
    .status-warning { background: var(--color-status-warning); }
    .status-missing { background: var(--color-status-missing); }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--color-background-secondary);
      border-radius: var(--border-radius-lg);
      overflow: hidden;
      border: 0.5px solid var(--color-border-secondary);
    }

    th,
    td {
      padding: 14px 16px;
      border-bottom: 0.5px solid var(--color-border-tertiary);
      text-align: left;
      font-size: 14px;
    }

    th {
      color: var(--color-text-secondary);
      font-weight: 500;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 10px;
    }

    .hero {
      display: grid;
      grid-template-columns: 240px 1fr 340px;
      gap: 24px;
      margin-bottom: 28px;
    }

    .hero-poster {
      aspect-ratio: 2/3;
      border-radius: var(--border-radius-lg);
      background: var(--color-background-secondary);
      border: 0.5px solid var(--color-border-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 68px;
      color: var(--color-text-tertiary);
    }

    .hero-main,
    .hero-side {
      background: var(--color-background-secondary);
      border-radius: var(--border-radius-lg);
      border: 0.5px solid var(--color-border-secondary);
      padding: 22px;
    }

    .hero-title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .hero-title {
      font-size: 34px;
      font-weight: 500;
      letter-spacing: -0.04em;
    }

    .meta-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      color: var(--color-text-secondary);
      margin-bottom: 18px;
    }

    .overview {
      color: var(--color-text-secondary);
      line-height: 1.6;
      margin: 18px 0 24px;
    }

    .action-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .action-btn {
      height: 42px;
      padding: 0 16px;
      border-radius: var(--border-radius-md);
      border: 0.5px solid var(--color-border-secondary);
      background: var(--color-background-tertiary);
      color: var(--color-text-primary);
      cursor: pointer;
    }

    .action-btn.primary {
      background: var(--color-primary);
      border-color: var(--color-primary);
    }

    .section-title {
      font-size: 18px;
      margin-bottom: 18px;
      font-weight: 500;
    }

    .cast-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .cast-card {
      background: var(--color-background-secondary);
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-lg);
      padding: 16px;
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--color-background-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      color: var(--color-text-secondary);
    }

    .cast-name {
      font-weight: 500;
      margin-bottom: 4px;
    }

    .cast-role {
      color: var(--color-text-secondary);
      font-size: 13px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 24px;
    }

    .panel {
      background: var(--color-background-secondary);
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-lg);
      padding: 22px;
      margin-bottom: 22px;
    }

    .info-group {
      margin-bottom: 24px;
    }

    .info-group:last-child {
      margin-bottom: 0;
    }

    .info-label {
      color: var(--color-text-secondary);
      margin-bottom: 10px;
      font-size: 13px;
    }

    .info-value {
      line-height: 1.6;
    }

    .mono {
      font-family: monospace;
      font-size: 13px;
      word-break: break-all;
      color: var(--color-text-secondary);
    }

    .season-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .season-tab {
      height: 40px;
      padding: 0 16px;
      border-radius: 999px;
      border: 0.5px solid var(--color-border-secondary);
      background: var(--color-background-secondary);
      color: var(--color-text-secondary);
      cursor: pointer;
    }

    .season-tab.active {
      background: var(--color-primary-soft);
      border-color: var(--color-primary-border);
      color: var(--color-primary-text);
    }

    .episode-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 0.5px solid var(--color-border-tertiary);
    }

    .episode-main {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .episode-number {
      color: var(--color-text-tertiary);
      width: 42px;
    }

    .episode-meta {
      color: var(--color-text-secondary);
      font-size: 13px;
      margin-top: 5px;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 30;
    }

    .modal {
      width: 420px;
      background: var(--color-background-secondary);
      border: 0.5px solid var(--color-border-secondary);
      border-radius: var(--border-radius-lg);
      padding: 22px;
    }

    .modal-title {
      font-size: 18px;
      margin-bottom: 18px;
      font-weight: 500;
    }

    .option-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 24px;
    }

    .option {
      padding: 10px 14px;
      border-radius: 999px;
      border: 0.5px solid var(--color-border-secondary);
      cursor: pointer;
      color: var(--color-text-secondary);
    }

    .option.selected {
      background: var(--color-primary-soft);
      color: var(--color-primary-text);
      border-color: var(--color-primary-border);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }

    .modal-btn {
      height: 40px;
      padding: 0 14px;
      border-radius: var(--border-radius-md);
      border: 0.5px solid var(--color-border-secondary);
      background: var(--color-background-tertiary);
      color: var(--color-text-primary);
      cursor: pointer;
    }

    .modal-btn.apply {
      background: var(--color-primary);
      border-color: var(--color-primary);
    }

    @media (max-width: 1280px) {
      .hero,
      .detail-grid {
        grid-template-columns: 1fr;
      }

      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">Index<span>arr</span></div>

      <nav class="nav" id="nav"></nav>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="search">
          <input placeholder="Rechercher films, séries, codecs..." />
          <div class="shortcut">/</div>
        </div>
      </div>

      <div class="content" id="content"></div>
    </main>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-title" id="modalTitle"></div>
      <div class="option-grid" id="modalOptions"></div>
      <div class="modal-actions">
        <button class="modal-btn" id="clearBtn">Effacer</button>
        <button class="modal-btn apply" id="applyBtn">Appliquer</button>
      </div>
    </div>
  </div>

  <script>
    const movies = [
      {
        id: 1,
        type: 'movie',
        title: 'Dune Part Two',
        year: 2024,
        resolution: '4K',
        codec: 'HEVC',
        audio: 'TrueHD Atmos',
        hdr: 'Dolby Vision',
        status: 'ok'
      },
      {
        id: 2,
        type: 'movie',
        title: 'Blade Runner 2049',
        year: 2017,
        resolution: '1080p',
        codec: 'AV1',
        audio: 'DTS-HD MA',
        hdr: 'HDR10+',
        status: 'warning'
      }
    ];

    const series = [
      {
        id: 101,
        type: 'series',
        title: 'Breaking Bad',
        years: '2008-2013',
        resolution: '4K',
        codec: 'HEVC',
        audio: 'EAC3 5.1',
        hdr: 'Dolby Vision',
        status: 'ok'
      },
      {
        id: 102,
        type: 'series',
        title: 'Severance',
        years: '2022-',
        resolution: '4K',
        codec: 'HEVC',
        audio: 'AAC 5.1',
        hdr: 'HDR10+',
        status: 'missing'
      }
    ];

    const navItems = [
      { key: 'movies', label: 'Films', badge: movies.length },
      { key: 'series', label: 'Séries', badge: series.length },
      { key: 'recent', label: 'Récents' },
      { key: 'stats', label: 'Statistiques' },
      { key: 'issues', label: 'Problèmes' },
      { key: 'settings', label: 'Paramètres' }
    ];

    const filterConfig = {
      statut: ['Disponible', 'En upgrade', 'Manquant'],
      resolution: ['4K', '1080p', '720p'],
      codec: ['HEVC', 'AV1', 'H264'],
      audio: ['Atmos', 'DTS-HD', 'AAC'],
      hdr: ['Dolby Vision', 'HDR10+'],
      tri: ['Titre', 'Année', 'Taille']
    };

    const state = {
      page: 'movies',
      view: 'grid',
      filters: {},
      history: [],
      activeSeason: 1
    };

    const navEl = document.getElementById('nav');
    const contentEl = document.getElementById('content');

    function renderNav() {
      navEl.innerHTML = navItems.map(item => `
        <div class="nav-item ${state.page === item.key ? 'active' : ''}" onclick="navigate('${item.key}')">
          <span>${item.label}</span>
          ${item.badge ? `<span class="nav-badge">${item.badge}</span>` : ''}
        </div>
      `).join('');
    }

    function navigate(page) {
      state.page = page;
      render();
    }

    function renderStats() {
      return `
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Total</div>
            <div class="stat-value">248</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Espace disque</div>
            <div class="stat-value">41.2 TB</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Contenu 4K</div>
            <div class="stat-value">72%</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Problèmes</div>
            <div class="stat-value">6</div>
          </div>
        </div>
      `;
    }

    function renderFilters() {
      return `
        <div class="filters">
          <div class="chips">
            ${Object.keys(filterConfig).map(key => `
              <button class="chip ${state.filters[key]?.length ? 'active' : ''}" onclick="openFilter('${key}')">
                ${key}
                ${state.filters[key]?.length ? `<span class="chip-count">${state.filters[key].length}</span>` : ''}
              </button>
            `).join('')}
          </div>

          <div class="view-toggle">
            <button class="toggle-btn ${state.view === 'grid' ? 'active' : ''}" onclick="setView('grid')">▥</button>
            <button class="toggle-btn ${state.view === 'list' ? 'active' : ''}" onclick="setView('list')">☰</button>
          </div>
        </div>
      `;
    }

    function badge(type, value) {
      let cls = 'badge-1080';
      if (value === '4K') cls = 'badge-4k';
      if (value === 'Dolby Vision') cls = 'badge-dv';
      if (value === 'HDR10+') cls = 'badge-hdr10';
      return `<span class="badge ${cls}">${value}</span>`;
    }

    function renderGrid(items) {
      return `
        <div class="media-grid">
          ${items.map(item => `
            <div class="media-card" onclick="openDetail('${item.type}', ${item.id})">
              <div class="poster">${item.title[0]}</div>
              <div class="card-body">
                <div class="title-row">
                  <div class="media-title">${item.title}</div>
                  <div class="media-year">${item.year || item.years}</div>
                </div>

                <div class="badge-row">
                  ${badge('resolution', item.resolution)}
                  ${badge('hdr', item.hdr)}
                  <span class="badge badge-1080">${item.codec}</span>
                </div>

                <div class="status-bar status-${item.status}"></div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderTable(items) {
      return `
        <table>
          <thead>
            <tr>
              <th>Titre</th>
              <th>Résolution</th>
              <th>Codec</th>
              <th>Audio</th>
              <th>HDR</th>
              <th>Taille</th>
              <th>Année</th>
            </tr>
          </thead>
          <tbody>
            ${items.map(item => `
              <tr onclick="openDetail('${item.type}', ${item.id})" style="cursor:pointer">
                <td>
                  <span class="status-dot status-${item.status}"></span>
                  ${item.title}
                </td>
                <td>${item.resolution}</td>
                <td>${item.codec}</td>
                <td>${item.audio}</td>
                <td>${item.hdr}</td>
                <td>48 GB</td>
                <td>${item.year || item.years}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }

    function renderListPage(type) {
      const items = type === 'movies' ? movies : series;

      contentEl.innerHTML = `
        ${renderFilters()}
        ${renderStats()}
        ${state.view === 'grid' ? renderGrid(items) : renderTable(items)}
      `;
    }

    function renderMovieDetail() {
      contentEl.innerHTML = `
        <div class="breadcrumb-row">
          <button class="back-btn" onclick="navigate('movies')">Retour</button>

        <div class="section-title">Cast principal</div>
        <div class="cast-grid">
          ${['Timothée Chalamet', 'Zendaya', 'Rebecca Ferguson', 'Austin Butler'].map(name => `
            <div class="cast-card">
              <div class="avatar">${name.split(' ').map(v => v[0]).join('')}</div>
              <div class="cast-name">${name}</div>
              <div class="cast-role">Acteur principal</div>

          `).join('')}

        <div class="detail-grid">
          <div>
            <div class="panel">
              <div class="section-title">MediaInfo</div>
              <table>
                <thead>
                  <tr>
                    <th>Type</th>

                  <tr>
                    <td>Vidéo</td>

                    <td>Audio #1</td>

                  <tr>
                    <td>Audio #2</td>

                    <td>256 kb/s</td>

                    <td>Sous-titres</td>

          <div>
            <div class="panel">
              <div class="section-title">Informations</div>

    }

    function renderSeriesDetail() {
      const episodes = {
        1: [
          { n: 'E01', title: 'Pilot', missing: false },
          { n: 'E02', title: 'Cat\'s in the Bag...', missing: false },
          { n: 'E03', title: '...And the Bag\'s in the River', missing: true }
        ],
        2: [
          { n: 'E01', title: 'Seven Thirty-Seven', missing: false },
          { n: 'E02', title: 'Grilled', missing: false }
        ]
      };

      contentEl.innerHTML = `
        <div class="breadcrumb-row">
          <button class="back-btn" onclick="navigate('series')">Retour</button>
          <div class="breadcrumb">Séries / Breaking Bad</div>
        </div>

        <div class="hero">
          <div class="hero-poster">B</div>

          <div class="hero-main">
            <div class="hero-title-row">
              <div class="hero-title">Breaking Bad</div>
              <span class="badge badge-4k">TVDB 9.5</span>
            </div>

            <div class="meta-row">
              <span>2008-2013</span>
              <span>5 saisons</span>
              <span>62 épisodes</span>
              <span>Terminée</span>
            </div>

            <div class="badge-row">
              ${badge('', '4K')}
              ${badge('', 'Dolby Vision')}
              <span class="badge badge-1080">HEVC</span>
              <span class="badge badge-1080">EAC3</span>
            </div>

            <div class="overview">
              Walter White, professeur de chimie atteint d'un cancer, se lance dans la fabrication de méthamphétamine avec son ancien élève Jesse Pinkman.
            </div>

            <div class="action-row">
              <button class="action-btn primary">Rechercher upgrade</button>
              <button class="action-btn">Ouvrir dans Sonarr</button>
              <button class="action-btn">TVDB</button>
            </div>
          </div>

          <div class="hero-side">
            <div class="info-group">
              <div class="info-label">Créateur</div>
              <div class="info-value">Vince Gilligan</div>
            </div>

            <div class="info-group">
              <div class="info-label">Taille totale</div>
              <div class="info-value">2.4 TB</div>
            </div>

            <div class="info-group">
              <div class="info-label">Langues</div>
              <div class="info-value">ENG · FRA</div>
            </div>
          </div>
        </div>

        <div class="season-tabs">
          <button class="season-tab ${state.activeSeason === 1 ? 'active' : ''}" onclick="setSeason(1)">Saison 1</button>
          <button class="season-tab ${state.activeSeason === 2 ? 'active' : ''}" onclick="setSeason(2)">Saison 2</button>
        </div>

        <div class="panel">
          <div class="section-title">Saison ${state.activeSeason}</div>
          <div class="meta-row">
            <span>Disponible: 12</span>
            <span>Manquants: 1</span>
            <span>Taille: 182 GB</span>
          </div>

          ${episodes[state.activeSeason].map(ep => `
            <div class="episode-row">
              <div class="episode-main">
                <div class="episode-number">${ep.n}</div>
                <div>
                  <div>${ep.title}</div>
                  <div class="episode-meta">52 min · HEVC · EAC3 5.1</div>
                </div>
              </div>

              <div class="badge-row">
                <span class="badge badge-4k">4K</span>
                ${ep.missing ? '<span class="badge badge-missing">Manquant</span>' : ''}
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function openDetail(type) {
      state.page = type === 'movie' ? 'movie-detail' : 'series-detail';
      render();
    }

    function setView(view) {
      state.view = view;
      render();
    }

    function setSeason(season) {
      state.activeSeason = season;
      renderSeriesDetail();
    }

    const modalOverlay = document.getElementById('modalOverlay');
    const modalTitle = document.getElementById('modalTitle');
    const modalOptions = document.getElementById('modalOptions');

    let currentFilter = null;
    let currentSelection = [];

    function openFilter(key) {
      currentFilter = key;
      currentSelection = [...(state.filters[key] || [])];

      modalTitle.textContent = key;

      renderModalOptions();

      modalOverlay.style.display = 'flex';
    }

    function renderModalOptions() {
      modalOptions.innerHTML = filterConfig[currentFilter].map(option => `
        <div class="option ${currentSelection.includes(option) ? 'selected' : ''}" onclick="toggleOption('${option}')">
          ${option}
        </div>
      `).join('');
    }

    function toggleOption(option) {
      if (currentFilter === 'tri') {
        currentSelection = [option];
      } else {
        if (currentSelection.includes(option)) {
          currentSelection = currentSelection.filter(v => v !== option);
        } else {
          currentSelection.push(option);
        }
      }

      renderModalOptions();
    }

    document.getElementById('clearBtn').onclick = () => {
      currentSelection = [];
      renderModalOptions();
    };

    document.getElementById('applyBtn').onclick = () => {
      state.filters[currentFilter] = currentSelection;
      modalOverlay.style.display = 'none';
      render();
    };

    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) {
        modalOverlay.style.display = 'none';
      }
    });

    function render() {
      renderNav();

      if (state.page === 'movies') renderListPage('movies');
      else if (state.page === 'series') renderListPage('series');
      else if (state.page === 'movie-detail') renderMovieDetail();
      else if (state.page === 'series-detail') renderSeriesDetail();
      else {
        contentEl.innerHTML = '<div class="panel">Section en construction</div>';
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === '/') {
        e.preventDefault();
        document.querySelector('.search input').focus();
      }
    });

    render();
  </script>
</body>
</html>
